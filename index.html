      "Đọc, đánh dấu, ghi chép, định hình việc sử dụng những thông tin phù hợp nhất, “đắt nhất” cho bài nói",
      "Chọn lựa và sắp xếp tư liệu theo một trình tự lôgíc, để hình thành đề cương",
      "Tuyệt đối không sử dụng những tư liệu không rõ nguồn gốc và những tư liệu, tài liệu không chính thống",
      "Tất cả đáp án trên"

    "correct": 3
  },
  {
    "q": "Chuyển đổi số quốc gia là gì?",
    "answers": [
      "Chuyển đổi số quốc gia là quá trình thay đổi tổng thể và toàn diện của cá nhân, tổ chức về cách sống, cách làm việc và phương thức sản xuất dựa trên các công nghệ số của một quốc gia.",
      "Chuyển đổi số quốc gia là việc xây dựng hạ tầng số và các phần mềm quản lý mà không liên quan đến thay đổi tổng thể cách sống, cách làm việc và phương thức sản xuất của cá nhân, tổ chức.",
      "Chuyển đổi số quốc gia chỉ là việc áp dụng công nghệ thông tin trong các cơ quan nhà nước, không ảnh hưởng đến các lĩnh vực kinh tế, xã hội và đời sống của người dân.",
      "Chuyển đổi số quốc gia là quá trình số hóa một số hoạt động hành chính và kinh tế của quốc gia mà không thay đổi phương thức làm việc, cách sống hay sản xuất."
    ],
    "correct": 0
  }    
];

// 🔀 Trộn câu hỏi
shuffle(questions);

const quizDiv = document.getElementById("quiz");

// 👉 Render câu hỏi
questions.forEach((q, index) => {

    const div = document.createElement("div");
    div.classList.add("question");

    const title = document.createElement("p");
    title.innerHTML = "<b>Câu " + (index + 1) + ":</b> " + q.q;
    div.appendChild(title);

    // 👉 GẮN ĐÚNG/SAI + TRỘN ĐÁP ÁN
    let answers = q.answers.map((a,i)=>({
        text: a,
        correct: i === q.correct
    }));

    shuffle(answers);

    answers.forEach((ans, i) => {

        const btn = document.createElement("button");
        btn.innerText = String.fromCharCode(65+i) + ". " + ans.text;

        btn.onclick = () => {

            if(div.classList.contains("done")) return;
            div.classList.add("done");

            answered++;

            if(ans.correct){
                btn.classList.add("correct");
                btn.innerText += " ✅";
                score++;
            } else {
                btn.classList.add("wrong");
                btn.innerText += " ❌";

                // 👉 HIỆN ĐÁP ÁN ĐÚNG
                const buttons = div.querySelectorAll("button");
                answers.forEach((a, idx) => {
                    if(a.correct){
                        buttons[idx].classList.add("correct");
                        buttons[idx].innerText += " ⭐";
                    }
                });
            }

            // 👉 CẬP NHẬT ĐIỂM
            document.getElementById("score").innerText =
                "Điểm: " + score + "/" + questions.length;

            // 👉 PROGRESS BAR
            document.getElementById("progress").style.width =
                (answered / questions.length * 100) + "%";
        };

        div.appendChild(btn);
    });

    quizDiv.appendChild(div);
});

</script>
