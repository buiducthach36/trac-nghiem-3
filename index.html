
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc nghiệm</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
    font-size: 18px; /* 🔥 thêm */
}

.container {
    max-width: 900px;
    margin: auto;
}

h2 {
    text-align: center;
    font-size: 22px; /* 🔥 to hơn */
}

.question {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    font-size: 17px; /* 🔥 thêm */
}

button {
    width: 100%;
    margin: 6px 0;
    padding: 12px; /* 🔥 to nút */
    border: none;
    border-radius: 8px;
    text-align: left;
    background: #eef1f5;
    transition: 0.3s;
    font-size: 17px; /* 🔥 chữ to */
}

button:hover {
    background: #dfe6ee;
}
.correct {
    background: #c8f7c5 !important;
    color: green;
    font-weight: bold;
}
.wrong {
    background: #f7c5c5 !important;
    color: red;
    font-weight: bold;
}
.score {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
}
.progress {
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}
.progress-bar {
    height: 10px;
    width: 0%;
    background: #4CAF50;
}
</style>
</head>

<body>

<div class="container">
<h2>Bài trắc nghiệm</h2>

<div class="score" id="score">Điểm: 0</div>

<div class="progress">
    <div class="progress-bar" id="progress"></div>
</div>

<div id="quiz"></div>
</div>

<script>

// 🔀 Shuffle chuẩn
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

let score = 0;
let answered = 0;

// 📌 DÁN CÂU HỎI VÀO ĐÂY
const questions = [
  {
    "q": "Đồng chí cho biết Quan hệ của “Lực lượng 47” với cấp ủy cấp mình là gì?",
    "answers": [
      "Là mối quan hệ phục tùng lãnh đạo và quản lý",
      "Là mối quan hệ phối hợp công tác",
      "Là mối quan hệ chỉ đạo và quản lý",
      "Là mối quan hệ phục tùng lãnh đạo, chỉ đạo và quản lý"
    ],
    "correct": 3
  },
  {
    "q": "Phụ trách trực tiếp lực lượng đấu tranh trên không gian mạng trong các đơn vị là",
    "answers": [
      "Lãnh đạo, chỉ huy đơn vị",
      "Cơ quan chính trị các cấp",
      "Chính ủy, chính trị viên (bí thư, cấp ủy)",
      "Chỉ huy đơn vị, chính ủy, chính trị viên (bí thư, cấp ủy)"
    ],
    "correct": 2
  },
  {
    "q": "Đồng chí cho biết Thông tư 118/2023/TT-BQP ngày 22 tháng 12 năm 2023 quy định về nội dung gì?",
    "answers": [
      "Quy định và hướng dẫn thi đua, khen thưởng trong Quân đội nhân dân Việt Nam",
      "Quy định và hướng dẫn thực hiện thi đua, khen thưởng trong Quân đội nhân dân Việt Nam",
      "Quy định, hướng dẫn thực hiện công tác thi đua, khen thưởng trong Quân đội nhân dân Việt Nam",
      "Quy định và hướng dẫn công tác thi đua, khen thưởng trong Quân đội nhân dân Việt Nam"
    ],
    "correct": 0
  },
  {
    "q": "Đồng chí cho biết theo Luật Thi đua, khen thưởng năm 2022 có mấy hình thức khen thưởng?",
    "answers": [
      "4 hình thức",
      "5 hình thức",
      "6 hình thức",
      "7 hình thức"
    ],
    "correct": 3
  },
  {
    "q": "Đồng chí cho biết Đảng ta xác định mấy phương châm tiến hành nhiệm vụ bảo vệ Tổ quốc Việt Nam xã hội chủ nghĩa trong tình hình mới?",
    "answers": [
      "3 phương châm",
      "4 phương châm",
      "5 phương châm",
      "6 phương châm"
    ],
    "correct": 0
  },
  {
    "q": "Đồng chí cho biết Đảng ta xác định mấy quan điểm chỉ đạo về nhiệm vụ bảo vệ Tổ quốc Việt Nam xã hội chủ nghĩa trong tình hình mới?",
    "answers": [
      "4 quan điểm",
      "5 quan điểm",
      "6 quan điểm",
      "7 quan điểm"
    ],
    "correct": 3
  },
  {
    "q": "Đồng chí cho biết Điều 1 Quy định số 144-QĐ/TW ngày 09/5/2024 của Bộ Chính trị về chuẩn mực đạo đức cách mạng của cán bộ, đảng viên trong giai đoạn mới là gì?",
    "answers": [
      "Yêu nước, tôn trọng, tuyệt đối trung thành với Đảng, với Tổ quốc, với Nhân dân",
      "Yêu nước, quý trọng Nhân dân, tuyệt đối trung thành với Đảng, với Tổ quốc",
      "Yêu nước, tôn trọng Nhân dân, tuyệt đối trung thành với Đảng, với Tổ quốc",
      "Yêu nước, quý trọng, tuyệt đối trung thành với Đảng, với Tổ quốc, với Nhân dân"
    ],
    "correct": 2
  },
  {
    "q": "Đồng chí cho biết Điều 2 Quy định số 144-QĐ/TW ngày 09/5/2024 của Bộ Chính trị về chuẩn mực đạo đức cách mạng của cán bộ, đảng viên trong giai đoạn mới là gì?",
    "answers": [
      "Bản lĩnh, sáng tạo, đổi mới, hội nhập",
      "Bản lĩnh, đổi mới, sáng tạo, hội nhập",
      "Bản lĩnh, đổi mới, linh hoạt, sáng tạo",
      "Bản lĩnh, sáng tạo, hội nhập, đổi mới"
    ],
    "correct": 1
  },
  {
    "q": "Đồng chí cho biết có mấy hình thức công tác tư tưởng trong quân đội?",
    "answers": [
      "3 hình thức",
      "4 hình thức",
      "5 hình thức",
      "6 hình thức"
    ],
    "correct": 2
  },
  {
    "q": "Đồng chí cho biết Điều 5 Quy định số 144-QĐ/TW ngày 09/5/2024 của Bộ Chính trị về chuẩn mực đạo đức cách mạng của cán bộ, đảng viên trong giai đoạn mới là gì?",
    "answers": [
      "Khiêm tốn, gương mẫu, tu dưỡng rèn luyện, học tập suốt đời",
      "Gương mẫu, khiêm tốn, tu dưỡng rèn luyện, học tập suốt đời",
      "Gương mẫu, khiêm tốn, tu dưỡng, học tập, rèn luyện suốt đời",
      "Khiêm tốn, gương mẫu, tu dưỡng học tập, rèn luyện suốt đời"
    ],
    "correct": 1
  }
];

// 🔀 Trộn câu hỏi
shuffle(questions);

const quizDiv = document.getElementById("quiz");

// 👉 Render câu hỏi
questions.forEach((q, index) => {

    const div = document.createElement("div");
    div.classList.add("question");

    const title = document.createElement("p");
    title.innerHTML = "<b>Câu " + (index + 1) + ":</b> " + q.q;
    div.appendChild(title);

    // 👉 GẮN ĐÚNG/SAI + TRỘN ĐÁP ÁN
    let answers = q.answers.map((a,i)=>({
        text: a,
        correct: i === q.correct
    }));

    shuffle(answers);

    answers.forEach((ans, i) => {

        const btn = document.createElement("button");
        btn.innerText = String.fromCharCode(65+i) + ". " + ans.text;

        btn.onclick = () => {

            if(div.classList.contains("done")) return;
            div.classList.add("done");

            answered++;

            if(ans.correct){
                btn.classList.add("correct");
                btn.innerText += " ✅";
                score++;
            } else {
                btn.classList.add("wrong");
                btn.innerText += " ❌";

                // 👉 HIỆN ĐÁP ÁN ĐÚNG
                const buttons = div.querySelectorAll("button");
                answers.forEach((a, idx) => {
                    if(a.correct){
                        buttons[idx].classList.add("correct");
                        buttons[idx].innerText += " ⭐";
                    }
                });
            }

            // 👉 CẬP NHẬT ĐIỂM
            document.getElementById("score").innerText =
                "Điểm: " + score + "/" + questions.length;

            // 👉 PROGRESS BAR
            document.getElementById("progress").style.width =
                (answered / questions.length * 100) + "%";
        };

        div.appendChild(btn);
    });

    quizDiv.appendChild(div);
});

</script>

</body>
</html>
