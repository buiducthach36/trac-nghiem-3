"Cấp tiểu đội: hằng tuần. Cấp Trung đội hằng tuần. Cấp Đại đội hằng tháng"
],
correct: 3
}
];

// 🔀 Trộn câu hỏi
shuffle(questions);

const quizDiv = document.getElementById("quiz");

// 👉 Render câu hỏi
questions.forEach((q, index) => {

    const div = document.createElement("div");
    div.classList.add("question");

    const title = document.createElement("p");
    title.innerHTML = "<b>Câu " + (index + 1) + ":</b> " + q.q;
    div.appendChild(title);

    // 👉 GẮN ĐÚNG/SAI + TRỘN ĐÁP ÁN
    let answers = q.answers.map((a,i)=>({
        text: a,
        correct: i === q.correct
    }));

    shuffle(answers);

    answers.forEach((ans, i) => {

        const btn = document.createElement("button");
        btn.innerText = String.fromCharCode(65+i) + ". " + ans.text;

        btn.onclick = () => {

            if(div.classList.contains("done")) return;
            div.classList.add("done");

            answered++;

            if(ans.correct){
                btn.classList.add("correct");
                btn.innerText += " ✅";
                score++;
            } else {
                btn.classList.add("wrong");
                btn.innerText += " ❌";

                // 👉 HIỆN ĐÁP ÁN ĐÚNG
                const buttons = div.querySelectorAll("button");
                answers.forEach((a, idx) => {
                    if(a.correct){
                        buttons[idx].classList.add("correct");
                        buttons[idx].innerText += " ⭐";
                    }
                });
            }

            // 👉 CẬP NHẬT ĐIỂM
            document.getElementById("score").innerText =
                "Điểm: " + score + "/" + questions.length;

            // 👉 PROGRESS BAR
            document.getElementById("progress").style.width =
                (answered / questions.length * 100) + "%";
        };

        div.appendChild(btn);
    });

    quizDiv.appendChild(div);
});

</script>

</body>
</html>
